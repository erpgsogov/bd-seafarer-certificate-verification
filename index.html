<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Seafarer Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Bangladesh Seafarer Certificate Verification</h1>
            <p>Government of the People's Republic of Bangladesh</p>
        </div>
    </header>

    <section class="container">
        <form id="verificationForm">
            <div class="form-group">
                <label for="certificateNo">Certificate Number</label>
                <input type="text" id="certificateNo" class="form-control" placeholder="Enter Certificate No" required>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth</label>
                <input type="date" id="dateOfBirth" class="form-control" required>
            </div>

            <button type="submit" class="btn-submit">VERIFY</button>
        </form>

        <div id="resultBox" class="result-box"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
