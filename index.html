<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Seafarer Certificate Verification</title>
    <!-- নতুন CSS ফাইল কানেক্ট করা -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="gov-header">
        <div class="container header-content">
            <div class="header-text">
                <h1>Bangladesh Seafarer Certificate Verification</h1>
                <p>Government of the People's Republic of Bangladesh</p>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="gov-nav">
        <div class="container">
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Verification</a></li>
            </ul>
        </div>
    </nav>

    <!-- Verification Section -->
    <section class="hero-section">
        <div class="container">
            <div class="verification-card">
                <h2>Verify Certificate</h2>
                <form id="verificationForm">
                    <div class="form-group">
                        <label for="certificateNo">Certificate Number</label>
                        <input type="text" id="certificateNo" class="form-control" placeholder="Enter Certificate No" required>
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth</label>
                        <input type="date" id="dateOfBirth" class="form-control" required>
                    </div>
                    <button type="submit" class="btn-submit">VERIFY</button>
                </form>
                <div id="resultBox" class="result-box"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="gov-footer">
        <div class="container">
            <p>&copy; 2026 Department of Shipping, Bangladesh. All rights reserved.</p>
        </div>
    </footer>

    <!-- নতুন JS ফাইল কানেক্ট করা -->
    <script src="script.js"></script>
</body>
</html>
